<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Black background -->
  <rect width="200" height="200" fill="#111111"/>

  <defs>
    <!-- U letterform clip path -->
    <clipPath id="u">
      <path d="M35 20 L35 120 Q35 185 100 185 Q165 185 165 120 L165 20 L135 20 L135 120 Q135 155 100 155 Q65 155 65 120 L65 20 Z"/>
    </clipPath>
  </defs>

  <!-- Left half of U: red -->
  <rect x="0" y="0" width="100" height="200" fill="#C1121F" clip-path="url(#u)"/>
  <!-- Right half of U: white -->
  <rect x="100" y="0" width="100" height="200" fill="#FFFFFF" clip-path="url(#u)"/>
</svg>
